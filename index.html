<!DOCTYPE html>
<html>
<head>
  <title>React Product Card</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body{
      font-family: Arial;
      background:#f2f2f2;
      margin:0;
      padding:40px;
    }

    .container{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      width:250px;
      padding:20px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .price{
      font-size:18px;
    }

    .instock{
      color:green;
      font-weight:bold;
    }

    .outstock{
      color:red;
      font-weight:bold;
    }
  </style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

function ProductCard(props){
  return(
    <div className="card">
      <h2>{props.name}</h2>
      <p className="price">Price: ₹{props.price}</p>

      {props.inStock ?
        <p className="instock">In Stock</p> :
        <p className="outstock">Out of Stock</p>
      }
    </div>
  )
}

function App(){
  return(
    <div className="container">

      <ProductCard
        name="Laptop"
        price="55000"
        inStock={true}
      />

      <ProductCard
        name="Headphones"
        price="2000"
        inStock={false}
      />

      <ProductCard
        name="Smart Watch"
        price="8000"
        inStock={true}
      />

    </div>
  )
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>)

</script>

</body>
</html>
